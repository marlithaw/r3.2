<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--app-canvas); }
  body { padding: 24px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .av-card { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-top: 3px solid var(--orange-pop); border-radius: 12px; padding: 16px; display: flex; gap: 14px; align-items: center; box-shadow: var(--elev-1); }
  .av { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center 25%; flex-shrink: 0; box-shadow: 0 0 0 3px var(--teal-dark); }
  .meta .name { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--teal-dark); letter-spacing: -0.02em; }
  .meta .role { font-family: var(--font-mono); font-weight: 700; font-size: 10px; color: var(--orange-pop); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
  .meta .desc { font-family: var(--font-body); font-size: 12px; color: var(--cool-muted); margin-top: 6px; line-height: 1.45; }
</style>
</head>
<body>
  <div class="av-card">
    <div class="av" style="background-image:url('../assets/coach-marlitha.png')"></div>
    <div class="meta">
      <div class="name">Marlitha Williams</div>
      <div class="role">Founding Coach</div>
      <div class="desc">3D portrait · 4 expression states · Teal Dark + Orange grading</div>
    </div>
  </div>
  <div class="av-card">
    <div class="av" style="background-image:url('../assets/coach-ray.png')"></div>
    <div class="meta">
      <div class="name">Coach Ray</div>
      <div class="role">Founding Coach</div>
      <div class="desc">3D portrait · 4 expression states · Teal Dark + Orange grading</div>
    </div>
  </div>
</body>
</html>
