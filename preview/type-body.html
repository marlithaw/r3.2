<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--app-canvas); }
  body { padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .label { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cool-muted); flex: 0 0 90px; padding-top: 4px; }
  .sample { flex: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Body 16</div>
    <div class="sample" style="font-family:var(--font-body);font-weight:400;font-size:16px;line-height:1.6;color:var(--deep-ink);">Begin with the students who are ready. Return attention to the class. Follow up privately when the room is moving.</div>
  </div>
  <div class="row">
    <div class="label">Body 16 / 500</div>
    <div class="sample" style="font-family:var(--font-body);font-weight:500;font-size:16px;line-height:1.6;color:var(--deep-ink);">On days you grounded first, your class reached readiness 3 minutes faster.</div>
  </div>
  <div class="row">
    <div class="label">Cool muted</div>
    <div class="sample" style="font-family:var(--font-body);font-weight:400;font-size:14px;line-height:1.5;color:var(--cool-muted);">SCREEN 02 · Equalizer Diagnostic · Last updated 4 min ago</div>
  </div>
</body>
</html>
