<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--app-canvas); }
  body { padding: 24px; display: flex; gap: 20px; align-items: center; }
  .fab {
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--action-grad);
    box-shadow: 0 8px 24px rgba(255,107,0,0.35);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: var(--font-mono); font-weight: 700;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    text-align: center; line-height: 1.1;
    cursor: pointer;
  }
  .meta { font-family: var(--font-body); color: var(--deep-ink); font-size: 13px; line-height: 1.5; }
  .meta .h { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--teal-dark); margin-bottom: 4px; letter-spacing: -0.02em; }
  .meta .mono { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.12em; color: var(--orange-pop); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="fab">START<br>INSTRUCTION</div>
  <div class="meta">
    <div class="mono">Time to Learn Tracker · FAB</div>
    <div class="h">Instruction Started.</div>
    <div>Bottom-right on Live + Clear the Fog. Logs IRT timestamp on tap.</div>
  </div>
</body>
</html>
