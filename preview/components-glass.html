<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0C3645; }
  body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; min-height: 100vh; background: linear-gradient(135deg,#092D3A,#1A5F7A); }
  .panel { padding: 16px; }
  .h { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: #fff; margin: 0 0 4px; }
  .s { font-family: var(--font-body); font-size: 12px; color: rgba(255,255,255,0.72); }
  .mono { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; color: var(--amber); text-transform: uppercase; margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="glass-panel panel"><div class="mono">Standard glass</div><div class="h">rgba(white, 0.10) · blur 20</div><div class="s">Use over Teal Dark / Mid surfaces.</div></div>
  <div class="glass-deep panel"><div class="mono">Deep glass</div><div class="h">rgba(26,95,122, 0.25) · blur 24</div><div class="s">Use over Teal Deepest, Live card.</div></div>
</body>
</html>
