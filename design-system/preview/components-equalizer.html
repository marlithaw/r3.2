<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0C3645; }
  body { padding: 24px; display: flex; gap: 32px; align-items: center; justify-content: center; min-height: 220px; }
  .eq { display: flex; gap: 8px; align-items: flex-end; height: 120px; }
  .eq .bar { width: 14px; background: var(--orange-pop); border-radius: 3px; animation: pulse 0.8s ease-in-out infinite; }
  .eq .bar:nth-child(1) { height: 40%; animation-delay: 0s; }
  .eq .bar:nth-child(2) { height: 70%; animation-delay: 0.12s; }
  .eq .bar:nth-child(3) { height: 95%; animation-delay: 0.24s; }
  .eq .bar:nth-child(4) { height: 55%; animation-delay: 0.36s; }
  .eq .bar:nth-child(5) { height: 80%; animation-delay: 0.48s; }
  @keyframes pulse { 0%,100% { transform: scaleY(1); opacity: 1; } 50% { transform: scaleY(0.5); opacity: 0.7; } }
  .info { color: #fff; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .info .h { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.02em; text-transform: uppercase; color: #fff; margin-bottom: 6px; letter-spacing: -0.03em; }
  .info .s { color: var(--amber); }
</style>
</head>
<body>
  <div class="eq"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
  <div class="info"><div class="h">Check Your Levels</div><div class="s">5 BARS · 0.8s EASE-IN-OUT · ORANGE POP</div></div>
</body>
</html>
