<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--app-canvas); }
  body { padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .scale-row { display: flex; align-items: center; gap: 12px; }
  .bar { background: var(--orange-pop); height: 12px; border-radius: 2px; }
  .name { font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--cool-muted); letter-spacing: 0.1em; text-transform: uppercase; width: 70px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--cool-muted); }
  .radii { display: flex; gap: 16px; margin-top: 16px; align-items: flex-end; }
  .r { background: var(--teal-mid); width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-mono); font-weight: 700; font-size: 11px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="scale-row"><div class="name">4</div><div class="bar" style="width:4px"></div><div class="px">micro · tag interior</div></div>
    <div class="scale-row"><div class="name">8</div><div class="bar" style="width:8px"></div><div class="px">micro · icon→text</div></div>
    <div class="scale-row"><div class="name">12</div><div class="bar" style="width:12px"></div><div class="px">component · gap</div></div>
    <div class="scale-row"><div class="name">16</div><div class="bar" style="width:16px"></div><div class="px">component · padding</div></div>
    <div class="scale-row"><div class="name">24</div><div class="bar" style="width:24px"></div><div class="px">card padding</div></div>
    <div class="scale-row"><div class="name">32</div><div class="bar" style="width:32px"></div><div class="px">section gap</div></div>
    <div class="scale-row"><div class="name">48</div><div class="bar" style="width:48px"></div><div class="px">section gap (lg)</div></div>
    <div class="scale-row"><div class="name">64</div><div class="bar" style="width:64px"></div><div class="px">screen gutter</div></div>
  </div>
  <div class="radii">
    <div class="r" style="border-radius:4px">4</div>
    <div class="r" style="border-radius:6px">6</div>
    <div class="r" style="border-radius:12px">12</div>
    <div class="r" style="border-radius:16px 16px 0 0">16↑</div>
  </div>
</body>
</html>
