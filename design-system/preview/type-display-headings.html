<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--app-canvas); }
  body { padding: 24px; font-family: var(--font-body); color: var(--deep-ink); }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; }
  .label { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cool-muted); flex: 0 0 80px; padding-top: 8px; }
  .sample { flex: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Display 44</div>
    <div class="sample" style="font-family:var(--font-display);font-weight:800;font-size:44px;line-height:1.05;letter-spacing:-0.04em;color:var(--teal-dark);">Clear the Fog</div>
  </div>
  <div class="row">
    <div class="label">H2 / 28</div>
    <div class="sample" style="font-family:var(--font-display);font-weight:800;font-size:28px;line-height:1.1;letter-spacing:-0.03em;color:var(--teal-dark);">Name the track before you remix it</div>
  </div>
  <div class="row">
    <div class="label">H3 / 20</div>
    <div class="sample" style="font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.2;letter-spacing:-0.02em;color:var(--teal-mid);">Your seat is posted. Find it.</div>
  </div>
</body>
</html>
