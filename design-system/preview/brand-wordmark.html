<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0C3645; }
  body { padding: 24px; min-height: 200px; display: flex; gap: 24px; align-items: center; }
  .mark { width: 140px; height: 140px; border-radius: 14px; background: #092D3A; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 12px 32px rgba(9,45,58,0.5); position: relative; overflow: hidden; }
  .mark::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 30% 20%, rgba(255,107,0,0.15), transparent 60%); }
  .mark .r3 { font-family: var(--font-display); font-weight: 800; font-size: 64px; color: #fff; line-height: 1; letter-spacing: -0.05em; position: relative; }
  .mark .r3 sup { font-size: 28px; color: var(--orange-pop); }
  .mark .tag { font-family: var(--font-mono); font-weight: 700; font-size: 8px; letter-spacing: 0.2em; color: var(--amber); text-transform: uppercase; position: relative; }
  .desc { color: #fff; font-family: var(--font-body); max-width: 360px; }
  .desc .h { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.02em; margin-bottom: 6px; }
  .desc .b { font-size: 13px; line-height: 1.5; color: rgba(255,255,255,0.78); }
  .desc .m { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--orange-pop); text-transform: uppercase; margin-top: 8px; }
</style>
</head>
<body>
  <div class="mark"><div class="r3">R<sup>3</sup></div><div class="tag">AGENCY · PRACTICE</div></div>
  <div class="desc">
    <div class="h">R³AP wordmark</div>
    <div class="b">Inter Tight 800 — "R" with superscript orange "3," paired with mono lockup "AGENCY · PRACTICE." Use on Teal Deepest or Teal Dark surfaces only.</div>
    <div class="m">Primary brand mark</div>
  </div>
</body>
</html>
